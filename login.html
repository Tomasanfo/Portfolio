<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESO_RESTRINGIDO // ANFOSSI.T</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --matrix-green: #00ff41;
            --matrix-cyan: #00f0ff;
            --matrix-red: #ff003c;
            --matrix-dark: #0a0a0a;
            --matrix-black: #000000;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-mono);
            background: var(--matrix-black);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
            pointer-events: none;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
        }

        .crt-vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                transparent 60%,
                rgba(0, 0, 0, 0.6) 100%
            );
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9997;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 24px;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 48px;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .login-corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: var(--matrix-green);
            border-style: solid;
        }

        .login-corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .login-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
        .login-corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
        .login-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-icon {
            width: 64px;
            height: 64px;
            color: var(--matrix-green);
            margin: 0 auto 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .login-subtitle {
            font-size: 12px;
            color: #666;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 11px;
            color: var(--matrix-green);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .form-label .prompt {
            color: #666;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #666;
            transition: color 0.3s ease;
        }

        .form-input-wrapper:focus-within .form-icon {
            color: var(--matrix-green);
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            color: #fff;
            padding: 14px 14px 14px 44px;
            font-family: var(--font-mono);
            font-size: 14px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--matrix-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .form-input::placeholder {
            color: #444;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 4px;
        }

        .password-toggle:hover {
            color: var(--matrix-green);
        }

        .form-error {
            color: var(--matrix-red);
            font-size: 12px;
            margin-top: 8px;
            display: none;
            animation: shake 0.5s ease;
        }

        .form-error.visible {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .login-submit {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .login-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--matrix-green);
            transition: width 0.3s ease;
            z-index: -1;
        }

        .login-submit:hover::before {
            width: 100%;
        }

        .login-submit:hover {
            color: #000;
        }

        .login-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-submit.loading {
            pointer-events: none;
        }

        .login-submit.loading::after {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #666;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--matrix-green);
        }

        .security-info {
            margin-top: 16px;
            font-size: 10px;
            color: #333;
            letter-spacing: 1px;
        }

        .glitch {
            animation: glitch 0.3s ease;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 2px solid transparent;
            border-top-color: var(--matrix-red);
            border-right-color: var(--matrix-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-text {
            color: var(--matrix-red);
            font-size: 12px;
            letter-spacing: 2px;
        }

        .loading-log {
            color: #444;
            font-size: 10px;
            margin-top: 12px;
            line-height: 1.8;
        }

        .warning-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 60, 0.1);
            border: 1px solid var(--matrix-red);
            padding: 12px 24px;
            font-size: 11px;
            color: var(--matrix-red);
            letter-spacing: 1px;
            z-index: 100;
            animation: warning-pulse 2s infinite;
        }

        @keyframes warning-pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 32px 24px;
            }
            .login-title {
                font-size: 20px;
            }
            .login-icon {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="warning-message">
        ⚠ ZONA RESTRINGIDA - ACCESO MONITOREADO
    </div>

    <canvas id="matrix-canvas"></canvas>

    <div class="scanlines"></div>
    <div class="crt-vignette"></div>
    <div class="noise-overlay"></div>

    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">VERIFICANDO_CREDENCIALES...</div>
            <div class="loading-log">
                <div>> Escaneando huella digital...</div>
                <div>> Validando permisos...</div>
            </div>
        </div>
    </div>

    <div class="login-container">
        <div class="login-box" id="login-box">
            <span class="login-corner tl"></span>
            <span class="login-corner tr"></span>
            <span class="login-corner bl"></span>
            <span class="login-corner br"></span>

            <div class="login-header">
                <svg class="login-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <h1 class="login-title">ACCESO_RESTRINGIDO</h1>
                <p class="login-subtitle">Ingrese sus credenciales para continuar</p>
            </div>

            <form class="login-form" id="login-form">
                <div class="form-group">
                    <label class="form-label">
                        <span class="prompt">></span> USUARIO
                    </label>
                    <div class="form-input-wrapper">
                        <svg class="form-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <input type="text" class="form-input" id="username" placeholder="Ingrese usuario" autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <span class="prompt">></span> CONTRASEÑA
                    </label>
                    <div class="form-input-wrapper">
                        <svg class="form-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                        </svg>
                        <input type="password" class="form-input" id="password" placeholder="••••••••">
                        <button type="button" class="password-toggle" id="toggle-password">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="form-error" id="error-message">
                        ✗ Credenciales inválidas. Acceso denegado.
                    </div>
                </div>

                <button type="submit" class="login-submit" id="submit-btn">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                    </svg>
                    <span>INICIAR_SESIÓN</span>
                </button>
            </form>

            <div class="login-footer">
                <a href="index.html" class="back-link">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    <span>VOLVER_AL_INICIO</span>
                </a>
                <div class="security-info">
                    PROTOCOLO DE SEGURIDAD: AES-256 | SESIÓN ENCRIPTADA
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        const fontSize = 14;
        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const charArray = chars.split('');
        let drops = [];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            const columns = Math.floor(width / fontSize);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.font = `${fontSize}px 'JetBrains Mono', monospace`;

            for (let i = 0; i < drops.length; i++) {
                const char = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillStyle = Math.random() > 0.95 ? '#00f0ff' : '#00ff41';
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                drops[i] += 0.5;

                if (drops[i] * fontSize > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
            }
            requestAnimationFrame(drawMatrix);
        }

        drawMatrix();

        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
        });

        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const errorMessage = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loginBox = document.getElementById('login-box');

        usernameInput.focus();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            errorMessage.classList.remove('visible');
            loginBox.classList.remove('glitch');

            if (!username || !password) {
                showError('Complete todos los campos');
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            await new Promise(resolve => setTimeout(resolve, 1500));

            if (username === 'admin' && password === 'admin') {
                loadingOverlay.classList.add('active');
                playScarySound();
                setTimeout(() => {
                    window.location.href = 'hacked.html';
                }, 3000);
            } else {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
                showError('✗ ACCESO_DENEGADO: Credenciales inválidas');
                loginBox.classList.add('glitch');
                playErrorSound();
                setTimeout(() => {
                    loginBox.classList.remove('glitch');
                }, 300);
            }
        });

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('visible');
        }

        function playScarySound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();

            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(20, audioContext.currentTime + 2);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, audioContext.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 2);

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);

            oscillator.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 2);

            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();

            osc2.type = 'square';
            osc2.frequency.setValueAtTime(150, audioContext.currentTime);
            osc2.frequency.exponentialRampToValueAtTime(30, audioContext.currentTime + 2);

            gain2.gain.setValueAtTime(0.15, audioContext.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);

            osc2.connect(gain2);
            gain2.connect(audioContext.destination);

            osc2.start(audioContext.currentTime);
            osc2.stop(audioContext.currentTime + 2);
        }

        function playErrorSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.3);

            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
